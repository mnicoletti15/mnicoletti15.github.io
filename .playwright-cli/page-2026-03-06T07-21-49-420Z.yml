            - paragraph [ref=e50]: Research
            - heading "Current themes" [level=2] [ref=e51]
          - paragraph [ref=e52]: "The current research program moves between exact solvability and asymptotics: stochastic six-vertex models, dimer fluctuations, Gaussian free field limits, discrete Gaussians, and new geometric tools such as perfect t-embeddings."
        - generic [ref=e53]:
          - article [ref=e54]:
            - paragraph [ref=e55]: Lattice models
            - heading "Exactly solvable statistical mechanics" [level=3] [ref=e56]
            - paragraph [ref=e57]: Work on six-vertex models and random tilings uses integrable structure to derive sharp asymptotics, hydrodynamics, and distributional limits.
          - article [ref=e58]:
            - paragraph [ref=e59]: Geometry
            - heading "T-embeddings and periodic dimers" [level=3] [ref=e60]
            - paragraph [ref=e61]: Recent papers develop geometric frameworks for Aztec diamonds, tower graphs, lozenge tilings, and doubly periodic dimer models.
          - article [ref=e62]:
            - paragraph [ref=e63]: Fluctuations
            - heading "Gaussian fields and discrete Gaussians" [level=3] [ref=e64]
            - paragraph [ref=e65]: Several current projects isolate how Gaussian free fields interact with random boundary data, hole heights, and gaseous phases in dimer models.
