            - paragraph [ref=e53]: Research
            - heading "Research interests" [level=2] [ref=e54]
          - paragraph [ref=e55]: My work moves between exact solvability and asymptotic questions in probability and statistical mechanics, with a particular emphasis on six-vertex models, dimers, random tilings, and geometric approaches such as t-embeddings.
        - generic [ref=e56]:
          - article [ref=e57]:
            - paragraph [ref=e58]: Lattice models
            - heading "Exactly solvable models" [level=3] [ref=e59]
            - paragraph [ref=e60]: Recent work studies six-vertex models and related interacting particle systems through integrable structure, hydrodynamics, and distributional limits.
          - article [ref=e61]:
            - paragraph [ref=e62]: Geometry
            - heading "Dimers and t-embeddings" [level=3] [ref=e63]
            - paragraph [ref=e64]: A second line of work develops geometric tools for Aztec diamonds, lozenge tilings, tower graphs, and doubly periodic dimer models.
          - article [ref=e65]:
            - paragraph [ref=e66]: Fluctuations
            - heading "Fluctuations and Gaussian limits" [level=3] [ref=e67]
            - paragraph [ref=e68]: Current projects examine Gaussian free field limits, discrete Gaussian corrections, and fluctuations in multiply connected or periodic settings.
